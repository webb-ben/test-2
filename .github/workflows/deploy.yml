name: PyLODE to GitHub Pages

on:
  push:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
        - uses: cgs-earth/onto-to-pages@main

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
        name: github-pages
        url: ${{ steps.deployment.outputs.page_url }}

    steps:
        - name: Deploy to GitHub Pages
          id: deployment
          uses: actions/deploy-pages@v4
